services:
  # ==========================================================================
  # Frontend (Next.js)
  # ==========================================================================
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - app
    restart: unless-stopped

  # ==========================================================================
  # Application
  # ==========================================================================
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://estym:changeme@postgres:5432/estym_ai
      NEO4J_URI: bolt://neo4j:7687
      MINIO_ENDPOINT: minio:9000
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src  # hot reload in dev
      - ./data:/app/data
    command: uvicorn estym_ai.main:app --host 0.0.0.0 --port 8000 --reload

  # ==========================================================================
  # Celery Worker (file processing, embeddings)
  # ==========================================================================
  worker:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://estym:changeme@postgres:5432/estym_ai
      NEO4J_URI: bolt://neo4j:7687
      MINIO_ENDPOINT: minio:9000
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: celery -A estym_ai.utils.celery_app worker --loglevel=info --concurrency=4

  # ==========================================================================
  # PostgreSQL 17 + pgvector
  # ==========================================================================
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: estym_ai
      POSTGRES_USER: estym
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estym -d estym_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Redis (cache + Celery broker)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Neo4j (BOM graphs, operation precedence)
  # ==========================================================================
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data

  # ==========================================================================
  # MinIO (S3-compatible object storage for CAD files)
  # ==========================================================================
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ==========================================================================
  # MinIO bucket initialization
  # ==========================================================================
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/raw-uploads;
      mc mb --ignore-existing myminio/processed;
      mc mb --ignore-existing myminio/thumbnails;
      mc mb --ignore-existing myminio/embeddings-cache;
      echo 'Buckets created';
      "

  # ==========================================================================
  # Nginx reverse proxy (routes / → frontend, /api → backend)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  minio_data:
