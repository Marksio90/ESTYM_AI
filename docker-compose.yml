services:
  # ==========================================================================
  # Application
  # ==========================================================================
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src  # hot reload in dev
      - ./data:/app/data
    command: uvicorn estym_ai.main:app --host 0.0.0.0 --port 8000 --reload

  # ==========================================================================
  # Celery Worker (file processing, embeddings)
  # ==========================================================================
  worker:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: celery -A estym_ai.utils.celery_app worker --loglevel=info --concurrency=4

  # ==========================================================================
  # PostgreSQL 17 + pgvector
  # ==========================================================================
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: estym_ai
      POSTGRES_USER: estym
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estym -d estym_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Redis (cache + Celery broker)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Neo4j (BOM graphs, operation precedence)
  # ==========================================================================
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data

  # ==========================================================================
  # MinIO (S3-compatible object storage for CAD files)
  # ==========================================================================
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data

  # ==========================================================================
  # MinIO bucket initialization
  # ==========================================================================
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/raw-uploads;
      mc mb --ignore-existing local/processed;
      mc mb --ignore-existing local/thumbnails;
      mc mb --ignore-existing local/embeddings-cache;
      echo 'Buckets created';
      "

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  minio_data:
